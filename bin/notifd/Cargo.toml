[package]
name = "notifd"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "notifd"
path = "src/main.rs"

[dependencies]
notif-config = { path = "../../crates/notif-config" }
notif-types = { path = "../../crates/notif-types" }
notif-core = { path = "../../crates/notif-core" }
notif-dbus = { path = "../../crates/notif-dbus" }
notif-wl = { path = "../../crates/notif-wl" }
notif-render = { path = "../../crates/notif-render" }
notif-ipc = { path = "../../crates/notif-ipc" }
anyhow = { workspace = true }
log = { workspace = true }
env_logger = { version = "0.11", default-features = false, features = ["auto-color"] }
async-executor = "1"
async-io = { workspace = true }
async-channel = { workspace = true }
futures-lite = { workspace = true }
ctrlc = { version = "3", features = ["termination"] }
